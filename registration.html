<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration | ACLC College of Commonwealth</title>

    <link rel="icon" type="image/x-icon" href="./ACLC logo.jfif">

    <style>
        body {
            max-width: 100%;
            background-image: url(./back.jpg);
            background-repeat: repeat;
            background-attachment: fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
        }

        .container {
            min-height: 100vh;
            background: rgba(35, 65, 117, 0.85);
            padding: 20px 40px 60px;
            margin-top: 90px; /* slightly increased for safety */
        }

        .card {
            width: 800px;
            max-width: 100%; /* ✅ responsive fix */
            background: rgba(63, 129, 173, 0.39);
            padding: 30px;
            border-style: inset;
            border-width: 10px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            transition: .4s;
            margin: auto;
        }

        /* NAVBAR */
        nav {
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(0, 0, 80, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            z-index: 1000;
        }

        nav img {
            height: 50px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: 500;
            transition: 0.3s;
        }

        nav a:hover {
            color: #ff4d4d;
        }

        h1,
        h2,
        p {
            font-family: 'Times New Roman', Times, serif;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            outline: none; /* ✅ cleaner focus */
        }

        textarea {
            resize: none;
        }

        .row {
            display: flex;
            gap: 25px;
            flex-wrap: wrap; /* ✅ prevents breaking on small screens */
        }

        .row div {
            flex: 1;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 9px;
            flex-wrap: wrap; /* ✅ prevents overflow */
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            margin: 0;
            width: 16px;
            height: 16px;
        }

        .btns {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: blue;
            color: whitesmoke;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: darkblue; /* ✅ hover feedback */
        }

        footer {
            background: rgba(63, 129, 173, 0.39);
            text-align: center;
            padding: 15px;
            border-style: inset;
            backdrop-filter: blur(15px);
        }

        h2,
        label {
            color: white;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav>
        <img src="./ACLC nav.png" alt="ACLC Logo"> <!-- ✅ accessibility fix -->
        <div>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="Contacts.html">Contact</a>
            <a href="news.html">News</a>
            <a href="offers.html">Offers</a>
            <a href="registration.html">Registration</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>REGISTRATION FORM</h2>

            <!-- ✅ IMPORTANT FIX -->
            <form action="register.php" method="POST" enctype="multipart/form-data">

                <label>First Name</label>
                <input type="text" name="firstname" placeholder="Cozu" required>

                <label>Last Name</label>
                <input type="text" name="lastname" placeholder="Dela Cruz" required>

                <label>Middle Initial</label>
                <input type="text" name="middlename" placeholder="M.I" required>

                <label>Address</label>
                <input type="text" name="address" placeholder="L123 Block45, Quezon City" required>

                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>

                <label>Birth Place</label>
                <input type="text" name="birthplace" placeholder="Quezon City" required>

                <label>Date of Birth</label>
                <input type="date" name="birth" required>

                <label>Phone Number</label>
                <input type="tel" name="tel" placeholder="09XXXXXXXXX" required>

                <label>Sex</label>
                <div class="radio-group">
                    <label><input type="radio" name="sex" value="Male" required>Male</label>
                    <label><input type="radio" name="sex" value="Female" required>Female</label>
                </div>

                <label>Upload Birth Certificate</label>
                <input type="file" name="birth_certificate">

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required> <!-- ✅ required added -->
                    <label for="terms">I agree to the Terms and Conditions</label>
                </div>

                <div class="btns">
                    <button type="submit">Save & Submit</button>
                </div>

            </form>
        </div>
    </div>

    <footer>@2026 ACLC COLLEGE OF COMMONWEALTH</footer>

</body>
</html>
